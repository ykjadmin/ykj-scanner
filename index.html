<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRスキャナー</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    h1 { font-size: 18px; margin-bottom: 12px; }
    #reader { width: 300px; border-radius: 12px; overflow: hidden; }

    /* 全体カウンター */
    .total-bar {
      width: 90%; max-width: 400px;
      background: #0f3460;
      border-radius: 12px;
      padding: 12px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 8px;
    }
    .total-bar .total-label {
      font-size: 14px;
      color: #aaa;
    }
    .total-bar .total-num {
      font-size: 36px;
      font-weight: bold;
      color: #00C73C;
    }
    .total-bar .total-unit {
      font-size: 14px;
      color: #aaa;
    }

    /* 端末カウンター */
    .counter {
      width: 90%; max-width: 400px;
      display: flex; justify-content: center; gap: 16px;
      margin-bottom: 16px;
    }
    .counter-item {
      background: #16213e; border-radius: 10px; padding: 8px 16px; text-align: center;
    }
    .counter-item .num { font-size: 22px; font-weight: bold; color: #00C73C; }
    .counter-item .label { font-size: 10px; color: #666; margin-top: 2px; }

    /* 結果カード */
    #result-area {
      margin-top: 20px; width: 90%; max-width: 400px; text-align: center;
    }
    .result-card {
      background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 12px; display: none;
    }
    .result-card .emp-dept { font-size: 14px; color: #aaa; margin-bottom: 4px; }
    .result-card .emp-name { font-size: 24px; font-weight: bold; margin-bottom: 12px; }
    .status {
      display: inline-block; padding: 10px 32px; border-radius: 24px;
      font-size: 18px; font-weight: bold;
    }
    .status.success { background: #00C73C; color: #fff; }
    .status.already { background: #1565c0; color: #fff; }
    .status.error   { background: #c62828; color: #fff; }
    .status.processing { background: #555; color: #fff; }

    /* ポップアップ */
    #popup-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center; align-items: center;
    }
    #popup-overlay.show { display: flex; }
    #popup-box {
      background: #fff; border-radius: 20px; padding: 40px 32px;
      text-align: center; max-width: 340px; width: 90%;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    #popup-box .popup-icon { font-size: 56px; margin-bottom: 12px; }
    #popup-box .popup-dept { font-size: 14px; color: #888; }
    #popup-box .popup-name { font-size: 28px; font-weight: bold; color: #1a1a1a; margin: 8px 0; }
    #popup-box .popup-status {
      display: inline-block; padding: 10px 32px; border-radius: 24px;
      font-size: 20px; font-weight: bold; color: #fff; margin-top: 8px;
    }
    #popup-box .popup-status.success { background: #00C73C; }
    #popup-box .popup-status.already { background: #1565c0; }
    #popup-box .popup-status.error   { background: #c62828; }

    /* 手動入力 */
    #manual-area {
      margin-top: 16px; width: 90%; max-width: 400px; text-align: center;
    }
    #manual-area input {
      width: 60%; font-size: 20px; padding: 8px; border-radius: 8px;
      border: 2px solid #444; background: #0f3460; color: #fff; text-align: center;
    }
    #manual-area button {
      font-size: 16px; padding: 8px 16px; border: none; border-radius: 8px;
      background: #00C73C; color: #fff; cursor: pointer; margin-left: 8px;
    }

    /* ログ */
    #log-area { width: 90%; max-width: 400px; margin-top: 12px; }
    #log-area h2 { font-size: 14px; color: #666; margin-bottom: 8px; }
    .log-list { max-height: 200px; overflow-y: auto; font-size: 13px; }
    .log-entry { padding: 6px 0; border-bottom: 1px solid #2a2a4a; }
    .log-entry .time { color: #555; }
    .log-entry .ok  { color: #00C73C; }
    .log-entry .dup { color: #1565c0; }
    .log-entry .ng  { color: #c62828; }
  </style>
</head>
<body>

  <h1>受付スキャナー</h1>

  <!-- 全体出席数 -->
  <div class="total-bar">
    <span class="total-label">全体出席数</span>
    <span class="total-num" id="totalCount">-</span>
    <span class="total-unit">名</span>
  </div>

  <!-- この端末の処理数 -->
  <div class="counter">
    <div class="counter-item">
      <div class="num" id="countOk">0</div>
      <div class="label">この端末:出席</div>
    </div>
    <div class="counter-item">
      <div class="num" id="countDup" style="color:#1565c0;">0</div>
      <div class="label">重複</div>
    </div>
    <div class="counter-item">
      <div class="num" id="countNg" style="color:#c62828;">0</div>
      <div class="label">エラー</div>
    </div>
  </div>

  <div id="reader"></div>

  <!-- ポップアップ -->
  <div id="popup-overlay">
    <div id="popup-box">
      <div class="popup-icon" id="popupIcon"></div>
      <div class="popup-dept" id="popupDept"></div>
      <div class="popup-name" id="popupName"></div>
      <div><span class="popup-status" id="popupStatus"></span></div>
    </div>
  </div>

  <div id="result-area">
    <div class="result-card" id="resultCard">
      <div class="emp-dept" id="resDept"></div>
      <div class="emp-name" id="resName"></div>
      <div><span class="status" id="resStatus"></span></div>
    </div>
  </div>

  <div id="manual-area">
    <input type="tel" id="manualInput" placeholder="社員番号">
    <button onclick="manualCheckIn()">手動受付</button>
  </div>

  <div id="log-area">
    <h2>受付ログ</h2>
    <div class="log-list" id="logList"></div>
  </div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbz0cC5WkMw8q0WkEg1Uy6jop7ybs8Fwo5QlumlpasFgUjexVtqvyCiTQS06uEbr87SZ6g/exec';

    var countOk = 0, countDup = 0, countNg = 0;
    var isProcessing = false;
    var lastScanned = '';
    var lastTime = 0;
    var popupTimer = null;

    // ============ 音声 ============
    var audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playSuccessSound() {
      var ctx = getAudioCtx();
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.setValueAtTime(1320, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.3);
    }
    function playAlreadySound() {
      var ctx = getAudioCtx();
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(660, ctx.currentTime);
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.3);
    }
    function playErrorSound() {
      var ctx = getAudioCtx();
      var o = ctx.createOscillator(); var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'square';
      o.frequency.setValueAtTime(220, ctx.currentTime);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.4);
    }

    // ============ ポップアップ ============
    function showPopup(icon, dept, name, statusText, statusClass) {
      document.getElementById('popupIcon').textContent = icon;
      document.getElementById('popupDept').textContent = dept;
      document.getElementById('popupName').textContent = name;
      var el = document.getElementById('popupStatus');
      el.textContent = statusText;
      el.className = 'popup-status ' + statusClass;
      document.getElementById('popup-overlay').classList.add('show');
      if (popupTimer) clearTimeout(popupTimer);
      popupTimer = setTimeout(function() {
        document.getElementById('popup-overlay').classList.remove('show');
      }, 2500);
    }
    document.getElementById('popup-overlay').addEventListener('click', function() {
      this.classList.remove('show');
    });

    // ============ QRスキャナー ============
    var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    function onScanSuccess(decodedText) {
      var now = Date.now();
      if (isProcessing) return;
      if (decodedText === lastScanned && now - lastTime < 5000) return;
      lastScanned = decodedText;
      lastTime = now;
      doCheckIn(decodedText.trim());
    }
    function onScanFailure(error) {}

    // ============ 手動入力 ============
    function manualCheckIn() {
      var input = document.getElementById('manualInput');
      var val = input.value.trim();
      if (!val || isProcessing) return;
      doCheckIn(val);
      input.value = '';
    }
    document.getElementById('manualInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') manualCheckIn();
    });

    // ============ チェックイン ============
    function doCheckIn(empId) {
      isProcessing = true;
      showResult('', empId, '処理中...', 'processing');
      var url = GAS_URL + '?mode=api&action=checkin&empId=' + encodeURIComponent(empId) + '&callback=handleResponse&t=' + Date.now();
      var script = document.createElement('script');
      script.src = url;
      script.onerror = function() {
        showResult('', empId, '通信エラー', 'error');
        showPopup('❌', '', empId, '通信エラー', 'error');
        playErrorSound();
        addLog(empId, 'エラー', 'ng');
        countNg++; updateCounter();
        isProcessing = false;
      };
      document.body.appendChild(script);
      setTimeout(function() {
        if (isProcessing) {
          isProcessing = false;
          showResult('', empId, 'タイムアウト', 'error');
          showPopup('⏱', '', empId, 'タイムアウト', 'error');
          playErrorSound();
        }
      }, 10000);
    }

    function handleResponse(result) {
      isProcessing = false;

      // 全体カウント更新
      if (result.total !== undefined) {
        document.getElementById('totalCount').textContent = result.total;
      }

      if (result.status === 'SUCCESS') {
        showResult(result.dept, result.name, '出席登録 完了', 'success');
        showPopup('✅', result.dept, result.name, '出席登録 完了', 'success');
        playSuccessSound();
        addLog(result.empId, result.name, 'ok');
        countOk++;
      } else if (result.status === 'ALREADY') {
        showResult(result.dept, result.name, '登録済み', 'already');
        showPopup('ℹ️', result.dept, result.name, '登録済み', 'already');
        playAlreadySound();
        addLog(result.empId, result.name, 'dup');
        countDup++;
      } else {
        showResult('', '社員番号: ' + result.empId, '該当者なし', 'error');
        showPopup('❌', '', '社員番号: ' + result.empId, '該当者なし', 'error');
        playErrorSound();
        addLog(result.empId, '---', 'ng');
        countNg++;
      }
      updateCounter();
    }

    function showResult(dept, name, statusText, statusClass) {
      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('resDept').textContent = dept;
      document.getElementById('resName').textContent = name;
      var el = document.getElementById('resStatus');
      el.textContent = statusText;
      el.className = 'status ' + statusClass;
    }
    function updateCounter() {
      document.getElementById('countOk').textContent = countOk;
      document.getElementById('countDup').textContent = countDup;
      document.getElementById('countNg').textContent = countNg;
    }
    function addLog(empId, name, type) {
      var log = document.getElementById('logList');
      var now = new Date();
      var time = ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2) + ':' + ('0' + now.getSeconds()).slice(-2);
      var cls = type === 'ok' ? 'ok' : type === 'dup' ? 'dup' : 'ng';
      var label = type === 'ok' ? '出席' : type === 'dup' ? '済み' : 'NG';
      log.innerHTML = '<div class="log-entry"><span class="time">' + time + '</span> '
        + '<span class="' + cls + '">[' + label + ']</span> '
        + empId + ' ' + name + '</div>' + log.innerHTML;
    }
  </script>

</body>
</html>
